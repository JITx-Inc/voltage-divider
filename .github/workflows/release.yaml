
name: Publish to PyPI

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish ${{ github.ref_name }} to PyPI
    runs-on: ubuntu-24.04

    environment:
      name: pypi
      url: https://pypi.org/p/jitxlib-voltage-divider

    permissions:
      contents: read   # for reading content from a repo
      id-token: write  # IMPORTANT: this permission is mandatory for trusted publishing

    steps:

      - name: Ensure valid tag
        if: (! github.ref_type == 'tag') || (! startsWith(github.ref_name, 'v')) || contains(github.ref_name, '.dev')
        shell: bash
        run: |
          echo "Invalid tag for publishing: ${{ github.ref_name }}"
          exit -1

      - name: Fetch Release
        uses: robinraju/release-downloader@v1
        with:
          repository: ${{ github.repository }}
          tag: ${{ github.ref_name }}
          fileName: '*'
          out-file-path: dist/
          extract: false

      - name: List artifact files
        shell: bash
        run: |
            ls -la dist/ || true
            rm -f dist/requirements.txt

      - name: Check for PRELIM strings in dist/
        shell: bash
        run: |
          PRELIM_MATCHES=$(grep -rn "PRELIM" --exclude-dir=.git --exclude-dir=.github dist/ 2>/dev/null || true)
          if [ -n "$PRELIM_MATCHES" ]; then
            while IFS= read -r match; do
              FILE=$(echo "$match" | cut -d: -f1)
              LINENO=$(echo "$match" | cut -d: -f2)
              TEXT=$(echo "$match" | cut -d: -f3-)
              echo "::error file=${FILE},line=${LINENO}::PRELIM string found in dist/: ${TEXT}"
            done <<< "$PRELIM_MATCHES"
            echo "ERROR: PRELIM strings found in dist/ — aborting publish to PyPI"
            echo "$PRELIM_MATCHES"
            exit 1
          fi

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: "https://upload.pypi.org/legacy/"
          packages-dir: dist/
